kind: pipeline
type: docker
name: build-and-deploy
    
trigger:
  branch:
    - main
  event:
    - custom

steps:  
  - name: build-and-push
    image: plugins/docker
    settings:
      repo: registry.cn-shanghai.aliyuncs.com/sh-cloud/hpu
      registry: registry.cn-shanghai.aliyuncs.com
      tags:
        - latest
        - ${DRONE_COMMIT_SHA:0:8}
      dockerfile: backend/Dockerfile
      context: ./
      username:
        from_secret: aliyun_registry_username
      password:
        from_secret: aliyun_registry_password

  - name: notify-jenkins
    image: curlimages/curl:latest
    environment:
      JENKINS_TOKEN:
        from_secret: jenkins_token
      IMAGE_REPO: registry.cn-hangzhou.aliyuncs.com/sh-cloud/hpu
    commands:
      - >
        SHORT_SHA=${DRONE_COMMIT_SHA:0:8} &&
        curl -X POST https://gateway-api.shangyuanlabs.com/api/v1/jenkins/update-tag \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $JENKINS_TOKEN" \
        -d "{\"service\":\"hpu\",\"image\":\"${IMAGE_REPO}:${SHORT_SHA}\"}"
