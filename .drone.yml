---
kind: pipeline
type: docker
name: custom-build

trigger:
  branch:
    - main
  event:
    - custom

steps:
  - name: build-backend
    image: plugins/docker

    settings:
      registry: registry.cn-shanghai.aliyuncs.com
      repo: registry.cn-shanghai.aliyuncs.com/sh-cloud/hpu-backend
      context: backend
      dockerfile: backend/Dockerfile

      tags:
        - latest
        - ${DRONE_COMMIT_SHA}

      username:
        from_secret: aliyun_registry_username
      password:
        from_secret: aliyun_registry_password

  - name: build-frontend
    image: plugins/docker

    settings:
      registry: registry.cn-shanghai.aliyuncs.com
      repo: registry.cn-shanghai.aliyuncs.com/sh-cloud/hpu-frontend
      context: frontend
      dockerfile: frontend/Dockerfile

      tags:
        - latest
        - ${DRONE_COMMIT_SHA}

      username:
        from_secret: aliyun_registry_username
      password:
        from_secret: aliyun_registry_password
